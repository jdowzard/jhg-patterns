[project]
name = "jhg-patterns-web"
version = "0.1.0"
description = "JHG web styling: brand colors, CSS utilities, Tailwind config, Jinja templates"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "James Dowzard", email = "james.dowzard@jhg.com.au" }]
dependencies = []

[project.optional-dependencies]
flask = ["flask>=2.0", "jinja2>=3.0"]
all = ["flask>=2.0", "jinja2>=3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jhg_patterns"]
