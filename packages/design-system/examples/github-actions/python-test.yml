name: Python Tests

# Trigger on push to any branch and all pull requests
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against multiple Python versions
        python-version: ['3.10', '3.11', '3.12']

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up the specified Python version
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install uv package manager (faster than pip)
      - name: Install uv package manager
        run: pip install uv

      # Install project dependencies using uv
      # This reads from pyproject.toml or requirements files
      - name: Install dependencies
        run: uv sync

      # Run linting checks with Ruff (if configured)
      - name: Lint with Ruff
        run: uv run ruff check .
        continue-on-error: true

      # Format check with Ruff (if configured)
      - name: Format check with Ruff
        run: uv run ruff format . --check
        continue-on-error: true

      # Run type checking with mypy (if configured)
      - name: Type check with mypy
        run: uv run mypy .
        continue-on-error: true

      # Run pytest tests with coverage reporting
      - name: Run tests with pytest
        run: uv run pytest --cov=. --cov-report=xml --cov-report=term-missing

      # Upload coverage reports to Codecov (optional)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        if: matrix.python-version == '3.11' # Only upload once

# Notes for setup:
# 1. Ensure your project has a pyproject.toml or requirements file
# 2. Configure pytest in pyproject.toml:
#    [tool.pytest.ini_options]
#    testpaths = ["tests"]
#    addopts = "-v"
# 3. (Optional) Configure Ruff for linting in pyproject.toml:
#    [tool.ruff]
#    line-length = 100
# 4. (Optional) Configure mypy for type checking in pyproject.toml:
#    [tool.mypy]
#    python_version = "3.11"
# 5. Place this file in .github/workflows/python-test.yml in your repo
