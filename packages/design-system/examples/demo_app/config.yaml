# Application Configuration
# This file configures the Flask app with JHG Design System

name: "JHG Design System Demo"

# Theme configuration (can be inline or path to theme file)
theme: "theme.yaml"

# Cache settings
cache:
  enabled: true
  default_ttl: 600  # seconds
  ttls:
    dashboard_: 300   # Dashboard queries cached for 5 minutes
    users_: 120       # User queries cached for 2 minutes
    reports_: 1800    # Reports cached for 30 minutes

# Security settings
security:
  csrf_enabled: true
  rate_limiting_enabled: true
  rate_limit_default: "200 per day, 50 per hour"
  cors_enabled: true
  cors_origins: "*"

# Databricks connection (values from environment if not set)
# Set these environment variables:
#   DATABRICKS_HOST=adb-xxx.azuredatabricks.net
#   DATABRICKS_TOKEN=dapi...
#   DATABRICKS_SQL_PATH=/sql/1.0/warehouses/xxx
databricks:
  catalog: "ai_a"
  schema: "ds_template"

# Feature flags
enable_health_check: true
enable_cache_api: true
enable_error_pages: true

# Flask settings
debug: true
# secret_key: "..."  # or FLASK_SECRET_KEY env var (auto-generated if not set)
