[project]
name = "jhg-patterns-flask"
version = "0.1.0"
description = "Flask patterns: TTL caching, auth helpers, health checks"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "James Dowzard", email = "james.dowzard@jhg.com.au" }]
dependencies = []

[project.optional-dependencies]
databricks = ["databricks-sql-connector>=2.0"]
flask = ["flask>=2.0"]
all = ["databricks-sql-connector>=2.0", "flask>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jhg_patterns"]
